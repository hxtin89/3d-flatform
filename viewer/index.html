<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBB Point Cloud Viewer — Local Pipeline</title>
  <meta name="description" content="Local self-hosted 3D point cloud viewer powered by CesiumJS. Renders LAZ/3D Tiles from the local processing pipeline without Cesium ion." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Main viewer container -->
  <div id="cesium-container"></div>

  <!-- Status overlay -->
  <div id="status-overlay" class="status-overlay">
    <div class="status-icon" id="status-icon">
      <div class="spinner" id="status-spinner"></div>
      <svg id="status-check" class="icon-check hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <svg id="status-error-icon" class="icon-error hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
    </div>
    <div class="status-content">
      <div class="status-title" id="status-title">Loading Point Cloud</div>
      <div class="status-message" id="status-message">Connecting to local tile server…</div>
    </div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-dot"></div>
      <span class="brand-name">SBB Point Cloud</span>
      <span class="brand-badge" id="brand-badge">LOCAL</span>
    </div>
    <div class="topbar-meta" id="topbar-meta">
      <span id="meta-dataset">autzen.laz</span>
      <span class="meta-sep">·</span>
      <span id="meta-status">Initializing…</span>
    </div>
  </div>

  <!-- Controls panel -->
  <div class="controls-panel" id="controls-panel">
    <!-- Quality presets -->
    <div class="control-group">
      <div class="control-label">Quality Preset</div>
      <div class="preset-buttons">
        <button class="preset-btn" id="preset-low" data-preset="low">Low</button>
        <button class="preset-btn active" id="preset-medium" data-preset="medium">Medium</button>
        <button class="preset-btn" id="preset-high" data-preset="high">High</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="control-group">
      <div class="control-label">Rendering</div>
      <div class="stats-grid">
        <div class="stat-row">
          <span class="stat-key">SSE</span>
          <span class="stat-val" id="stat-sse">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-key">Memory</span>
          <span class="stat-val" id="stat-memory">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-key">Tiles loaded</span>
          <span class="stat-val" id="stat-tiles">—</span>
        </div>
      </div>
    </div>

    <!-- Camera controls -->
    <div class="control-group">
      <div class="control-label">Camera</div>
      <button class="action-btn" id="btn-fly-home">↩ Fly to Point Cloud</button>
    </div>

    <!-- Tile server info -->
    <div class="control-group server-info">
      <div class="control-label">Tile Server</div>
      <div class="server-url" id="server-url">http://localhost:8081</div>
    </div>
  </div>

  <!-- Keyboard shortcut hint -->
  <div class="keyboard-hint">
    <span>Left-drag: Orbit</span>
    <span>·</span>
    <span>Scroll: Zoom</span>
    <span>·</span>
    <span>Right-drag: Pan</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
